<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Lazarus Sentinel</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css" />

<style>
  @page { size: landscape; margin: 0.4cm; }
  @media print {
    html, body { background: #F5F1EB !important; }
    /* hide floating overlays + status chrome that don't translate to print */
    [data-print-hide="true"] { display: none !important; }
    /* let the page flow naturally instead of viewport-clamped */
    html, body, #root { height: auto !important; overflow: visible !important; }
    main, .scroll-area { overflow: visible !important; height: auto !important; padding-bottom: 16px !important; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    /* avoid breaking cards across pages */
    .print-card, tr, .row { break-inside: avoid; }
  }
  /* Force print-friendly viewport while previewing too */
  body.print-preview { background: #F5F1EB; }
</style>

<script>
  // Force light theme + dashboard view for print
  window.__TWEAKS__ = /*EDITMODE-BEGIN*/{
    "theme": "light",
    "gridLayout": "2x3",
    "riskStyle": "inline",
    "showPalette": false
  }/*EDITMODE-END*/;
  window.__PRINT_MODE__ = true;
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/chrome.jsx"></script>
<script type="text/babel" src="src/dashboard.jsx"></script>
<script type="text/babel" src="src/composer.jsx"></script>
<script type="text/babel" src="src/console.jsx"></script>
<script type="text/babel" src="src/terminal.jsx"></script>
<script type="text/babel" src="src/tweaks.jsx"></script>
<script type="text/babel" src="src/add_server.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>

<script type="text/babel">
  // Print mode: tag overlays for hide, expand page, fire print
  (async () => {
    const tagOverlays = () => {
      // Floating navbar pill — fixed, bottom-centered
      document.querySelectorAll('div').forEach(el => {
        const cs = getComputedStyle(el);
        if (cs.position === 'fixed') {
          // navbar, command palette, modal backdrop, status bar
          el.setAttribute('data-print-hide', 'true');
        }
      });
      // Restore main content sizing
      document.querySelectorAll('main, [style*="overflow: hidden"], [style*="overflow:hidden"]').forEach(el => {
        el.style.overflow = 'visible';
        el.style.height = 'auto';
        el.style.maxHeight = 'none';
      });
      document.querySelectorAll('[style*="overflow: auto"], [style*="overflow:auto"]').forEach(el => {
        el.style.overflow = 'visible';
        el.style.height = 'auto';
        el.style.maxHeight = 'none';
        el.style.paddingBottom = '24px';
      });
      const root = document.getElementById('root');
      if (root) { root.style.height = 'auto'; root.style.minHeight = '0'; }
      document.documentElement.style.height = 'auto';
      document.body.style.height = 'auto';
      document.body.classList.add('print-preview');
    };

    // Wait for React to mount + fonts
    const waitMount = () => new Promise(res => {
      const tick = () => {
        if (document.querySelector('#root > div')) res();
        else setTimeout(tick, 80);
      };
      tick();
    });

    await waitMount();
    if (document.fonts && document.fonts.ready) {
      try { await document.fonts.ready; } catch (e) {}
    }
    await new Promise(r => setTimeout(r, 600));
    tagOverlays();
    await new Promise(r => setTimeout(r, 200));
    window.print();
  })();
</script>
</body>
</html>
